<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1a1a2e">
  <title>Kalorien Tracker</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <div class="header-row">
        <button type="button" class="icon-btn menu-btn" id="menuBtn" aria-label="Menü öffnen" aria-expanded="false">
          <span class="burger" aria-hidden="true"></span>
        </button>

        <div class="header-center" id="headerTracking">
          <div class="header-top">
            <button type="button" class="icon-btn" id="prevDay" aria-label="Vorheriger Tag">‹</button>
            <div class="date-display">
              <h1 id="dateLabel">Heute</h1>
              <p id="dateSub" class="date-sub"></p>
            </div>
            <button type="button" class="icon-btn" id="nextDay" aria-label="Nächster Tag">›</button>
          </div>
        </div>

        <div class="header-center header-center--page hidden" id="headerHistory">
          <h1 class="page-title" id="pageTitle">Übersicht</h1>
        </div>

        <div class="header-spacer" aria-hidden="true"></div>
      </div>
    </header>

    <!-- Tracking -->
    <main class="main view" id="viewTracking">
      <section class="summary-card" aria-label="Tagesübersicht">
        <p class="summary-label">Gesamt</p>
        <p class="summary-total"><span id="totalKcal">0</span> <span class="summary-unit">kcal</span></p>
        <p class="summary-subtotal"><span id="totalProtein">0</span> <span class="summary-unit">g Eiweiß</span></p>
        <p class="summary-macros" id="totalMacros">0 g P · 0 g F · 0 g K</p>
        <p class="summary-meta" id="entryCount">0 Einträge</p>
      </section>

      <section class="meals" id="mealsList" aria-label="Mahlzeiten"></section>
      <p class="empty-state" id="emptyState">Noch nichts eingetragen. Tippe unten auf +.</p>
    </main>

    <!-- History -->
    <main class="main view hidden" id="viewHistory">
      <div class="table-wrap">
        <table class="history-table">
          <thead>
            <tr>
              <th>Datum</th>
              <th class="num">kcal</th>
              <th class="num">g Eiweiß</th>
              <th class="num">Einträge</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
      <p class="empty-state hidden" id="historyEmpty">Noch keine Daten vorhanden.</p>
    </main>

    <!-- Custom foods -->
    <main class="main view hidden" id="viewCustomFoods">
      <form class="custom-food-form" id="customFoodForm">
        <label class="field">
          <span>Gericht</span>
          <input type="text" id="customFoodName" placeholder="z.B. Pasta Bolognese" required autocomplete="off">
        </label>

        <label class="field">
          <span>Referenzgewicht (g)</span>
          <input type="number" id="customFoodWeight" placeholder="100" min="1" max="5000" required inputmode="numeric" step="1">
        </label>

        <label class="field">
          <span>Kalorien (kcal / 100 g)</span>
          <input type="number" id="customFoodKcal" placeholder="180" min="0" max="10000" required inputmode="numeric">
        </label>

        <label class="field">
          <span>Eiweiß (g / 100 g)</span>
          <input type="number" id="customFoodProtein" placeholder="12" min="0" max="1000" inputmode="numeric" step="0.1">
        </label>

        <label class="field">
          <span>Kohlenhydrate (g / 100 g)</span>
          <input type="number" id="customFoodCarbs" placeholder="24" min="0" max="1000" inputmode="numeric" step="0.1">
        </label>

        <label class="field">
          <span>Fett (g / 100 g)</span>
          <input type="number" id="customFoodFat" placeholder="8" min="0" max="1000" inputmode="numeric" step="0.1">
        </label>

        <button type="submit" class="btn btn-primary">Gericht speichern</button>
      </form>

      <div class="custom-food-list" id="customFoodList"></div>
    </main>

    <button type="button" class="fab" id="addBtn" aria-label="Eintrag hinzufügen">+</button>
  </div>

  <!-- Nav drawer -->
  <div class="nav-backdrop hidden" id="navBackdrop"></div>
  <nav class="nav-drawer" id="navDrawer" aria-label="Navigation">
    <p class="nav-title">Kalorien Tracker</p>
    <button type="button" class="nav-item active" data-view="tracking">Tracking</button>
    <button type="button" class="nav-item" data-view="customFoods">Gerichte</button>
    <button type="button" class="nav-item" data-view="history">Übersicht</button>
  </nav>

  <!-- Add / Edit Modal -->
  <dialog class="modal" id="entryModal">
    <form method="dialog" class="modal-content" id="entryForm">
      <h2 id="modalTitle">Eintrag hinzufügen</h2>

      <label class="field">
        <span>Mahlzeit</span>
        <select id="mealSelect" required>
          <option value="frühstück">Frühstück</option>
          <option value="mittag">Mittag</option>
          <option value="abend">Abend</option>
          <option value="snack">Snack</option>
        </select>
      </label>

      <label class="field">
        <span>Bezeichnung</span>
        <input type="text" id="foodName" placeholder="z.B. Haferflocken" required autocomplete="off" aria-autocomplete="list" aria-controls="foodSearchResults" aria-expanded="false">
        <div class="search-results hidden" id="foodSearchResults" role="listbox" aria-label="Lebensmittelvorschläge"></div>
      </label>

      <label class="field">
        <span>Gewicht (g)</span>
        <input type="number" id="foodWeight" placeholder="150" min="1" max="5000" inputmode="numeric" step="1">
      </label>

      <label class="field">
        <span>Kalorien (kcal)</span>
        <input type="number" id="foodKcal" placeholder="350" min="1" max="10000" required inputmode="numeric">
      </label>

      <label class="field">
        <span>Eiweiß (g)</span>
        <input type="number" id="foodProtein" placeholder="25" min="0" max="1000" required inputmode="numeric" step="0.1">
      </label>

      <label class="field">
        <span>Kohlenhydrate (g)</span>
        <input type="number" id="foodCarbs" placeholder="40" min="0" max="1000" inputmode="numeric" step="0.1">
      </label>

      <label class="field">
        <span>Fett (g)</span>
        <input type="number" id="foodFat" placeholder="12" min="0" max="1000" inputmode="numeric" step="0.1">
      </label>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelEntry">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Speichern</button>
      </div>
    </form>
  </dialog>

</body>
